<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Commerce Product Intelligence Bot</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{background:white;border-radius:16px;width:800px;height:650px;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,0.1);overflow:hidden;}
.header{background:#1a73e8;color:white;padding:20px;text-align:center;}
.header h1{font-size:20px;}
.header p{font-size:13px;opacity:0.85;margin-top:4px;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.message{max-width:78%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;}
.bot{background:#f0f2f5;color:#333;align-self:flex-start;}
.bot strong{font-weight:600;color:#111;}
.bot ul{padding-left:18px;margin:6px 0;}
.bot li{margin:4px 0;}
.user{background:#1a73e8;color:white;align-self:flex-end;}
.input-area{padding:16px;border-top:1px solid #eee;display:flex;gap:10px;}
input{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:24px;font-size:14px;outline:none;}
input:focus{border-color:#1a73e8;}
button{background:#1a73e8;color:white;border:none;padding:12px 24px;border-radius:24px;cursor:pointer;font-size:14px;}
button:hover{background:#1557b0;}
.suggestions{display:flex;gap:8px;padding:0 20px 12px;flex-wrap:wrap;}
.suggestion{background:#e8f0fe;color:#1a73e8;border:none;padding:8px 14px;border-radius:16px;cursor:pointer;font-size:12px;}
.suggestion:hover{background:#d2e3fc;}
.thinking{color:#999;font-style:italic;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🛒 E-Commerce Product Intelligence Bot</h1>
<p>Ask me anything about products — specs, comparisons, recommendations!</p>
</div>
<div class="messages" id="messages">
<div class="message bot">Hi! I'm your personal shopping assistant powered by Google ADK. Ask me about product specs, comparisons, or recommendations!</div>
</div>
<div class="suggestions">
<button class="suggestion" onclick="ask('What are the specs of the Sony WH-1000XM5?')">🎧 Sony WH-1000XM5 specs</button>
<button class="suggestion" onclick="ask('Compare MacBook Air M3 vs Dell XPS 15')">💻 MacBook vs Dell</button>
<button class="suggestion" onclick="ask('Best laptop under $1000 for video editing')">🎬 Best laptop under $1000</button>
</div>
<div class="input-area">
<input type="text" id="input" placeholder="Ask about any product..." onkeypress="if(event.key==='Enter')sendMessage()"/>
<button onclick="sendMessage()">Send</button>
</div>
</div>
<script>
function ask(q){document.getElementById('input').value=q;sendMessage();}
async function sendMessage(){
const input=document.getElementById('input');
const query=input.value.trim();
if(!query)return;
input.value='';
const messages=document.getElementById('messages');
const userMsg=document.createElement('div');
userMsg.className='message user';
userMsg.textContent=query;
messages.appendChild(userMsg);
const typing=document.createElement('div');
typing.className='message bot thinking';
typing.textContent='Thinking...';
typing.id='typing';
messages.appendChild(typing);
messages.scrollTop=messages.scrollHeight;
try{
const response=await fetch('/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:'demo_user',query:query})});
const data=await response.json();
document.getElementById('typing').remove();
const botMsg=document.createElement('div');
botMsg.className='message bot';
botMsg.innerHTML=marked.parse(data.response||data.detail);
messages.appendChild(botMsg);
}catch(e){
document.getElementById('typing').remove();
const errMsg=document.createElement('div');
errMsg.className='message bot';
errMsg.textContent='Sorry, something went wrong. Please try again.';
messages.appendChild(errMsg);
}
messages.scrollTop=messages.scrollHeight;
}
</script>
</body>
</html>
